name: Notify AIOS on Content Change

# Triggers aios-devlo sync whenever content files are updated in devlo.ch
on:
  push:
    branches: [main]
    paths:
      - "src/content/**"
      - "src/data/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger aios-devlo sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.AIOS_SYNC_TOKEN }}
          repository: alldevlo/aios-devlo
          event-type: devloch-content-updated
