name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout slack-notifier skill
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: devlollc/devlo-aios
          sparse-checkout: skills/slack-notifier
          sparse-checkout-cone-mode: false
          path: .devlo-aios
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Deploy to Vercel
        run: npx vercel@50.34.3 --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Alias devlo.ch to latest deployment
        run: |
          echo "Fetching latest production deployment..."

          # Get the latest production deployment URL from Vercel API
          DEPLOY_HOST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&teamId=${{ secrets.VERCEL_ORG_ID }}&target=production&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; deps=json.load(sys.stdin).get('deployments',[]); print(deps[0]['url'] if deps else '')")

          echo "Latest production deployment: $DEPLOY_HOST"

          DEPLOY_ID=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_HOST?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")

          echo "Deployment ID: $DEPLOY_ID"

          if [ -z "$DEPLOY_ID" ]; then
            echo "ERROR: Could not find deployment ID"
            exit 1
          fi

          echo "Assigning devlo.ch alias..."
          RESULT=$(curl -s -X POST "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"alias":"devlo.ch"}')
          echo "$RESULT"

          if echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); e=d.get('error') or {}; exit(0 if 'alias' in d or e.get('code') == 'not_modified' else 1)" 2>/dev/null; then
            echo "devlo.ch alias assigned successfully or was already assigned to this deployment."
          else
            echo "ERROR: Failed to assign devlo.ch alias"
            echo "$RESULT"
            exit 1
          fi

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID || vars.SLACK_CHANNEL_ID }}
        run: |
          if [ ! -x .devlo-aios/skills/slack-notifier/scripts/slack_alert.sh ]; then
            echo "slack-notifier unavailable; cannot post failure alert"
            exit 0
          fi
          .devlo-aios/skills/slack-notifier/scripts/slack_alert.sh \
            --level critical \
            --message "devlo-website | devlo | deploy FAILED | run ${{ github.run_id }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
