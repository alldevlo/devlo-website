name: Fix devlo.ch domain

on:
  workflow_dispatch:

jobs:
  fix-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and fix devlo.ch domain
        run: |
          echo "=== Step 1: List project details ==="
          curl -s "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f'Project name: {data.get(\"name\")}')
          print(f'Project ID: {data.get(\"id\")}')
          print(f'Framework: {data.get(\"framework\")}')
          link = data.get('link', {})
          print(f'Git repo: {link.get(\"repo\")}')
          print(f'Git org: {link.get(\"org\")}')
          print(f'Production branch: {link.get(\"productionBranch\")}')
          "

          echo ""
          echo "=== Step 2: List project domains ==="
          curl -s "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(json.dumps(data, indent=2))
          "

          echo ""
          echo "=== Step 3: List recent deployments ==="
          curl -s "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&limit=5" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for d in data.get('deployments', []):
              aliases = d.get('alias', [])
              print(f'URL: {d.get(\"url\")} | target: {d.get(\"target\")} | state: {d.get(\"state\")} | aliases: {aliases} | created: {d.get(\"createdAt\")}')
          "

          echo ""
          echo "=== Step 4: Get latest production deployment aliases ==="
          LATEST_URL=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=production&limit=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          deps = data.get('deployments', [])
          if deps:
              d = deps[0]
              print(d.get('url', ''))
          ")
          echo "Latest production deployment: $LATEST_URL"

          if [ -n "$LATEST_URL" ]; then
            echo ""
            echo "=== Step 5: Get deployment details ==="
            curl -s "https://api.vercel.com/v13/deployments/$LATEST_URL?teamId=$VERCEL_ORG_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f'ID: {data.get(\"id\")}')
          print(f'URL: {data.get(\"url\")}')
          print(f'Target: {data.get(\"target\")}')
          print(f'State: {data.get(\"readyState\")}')
          print(f'Aliases: {data.get(\"alias\", [])}')
          print(f'Production: {data.get(\"isProduction\")}')
          print(f'Meta commit: {data.get(\"meta\", {}).get(\"githubCommitMessage\", \"N/A\")[:60]}')
          "

            echo ""
            echo "=== Step 6: Attempt to assign alias devlo.ch to latest deployment ==="
            DEPLOY_ID=$(curl -s "https://api.vercel.com/v13/deployments/$LATEST_URL?teamId=$VERCEL_ORG_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys, json
          print(json.load(sys.stdin).get('id', ''))
          ")
            echo "Deployment ID: $DEPLOY_ID"

            curl -s -X POST "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases?teamId=$VERCEL_ORG_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"alias":"devlo.ch"}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(json.dumps(data, indent=2))
          "
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
